name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Package web build
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build.zip

  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS without codesign
        run: flutter build ios --release --no-codesign

      - name: Package iOS build
        run: |
          cd build/ios/iphoneos
          tar -czf ../../../ios-runner-app.tar.gz Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: ios-runner-app.tar.gz

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-android
      - build-web
      - build-ios
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
      id: release_meta
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: artifacts

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-runner-app
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            artifacts/app-release.apk
            artifacts/web-build.zip
            artifacts/ios-runner-app.tar.gz
