name: Nightly E2E Smoke

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  critical-flow-smoke:
    name: Critical flow smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run critical flow smoke test
        run: flutter test test/e2e/critical_flow_test.dart