$kind: http-request
name: Update Team
method: PUT
url: '{{baseUrl}}/teams/update'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "teamId": "{{teamId}}",
      "playerIds": ["player1", "player2", "player3"]
    }
