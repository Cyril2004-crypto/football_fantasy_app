$kind: http-request
name: Sync Firebase User
method: POST
url: '{{supabaseFunctionsBaseUrl}}/sync-firebase-user'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{firebaseIdToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firebase_uid": "{{firebaseUid}}",
      "email": "user@example.com",
      "username": "John Doe"
    }
