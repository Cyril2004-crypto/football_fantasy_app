$kind: http-request
name: Get My Leagues
method: POST
url: '{{supabaseLeagueFunctionUrl}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "action": "myLeagues",
      "userId": "{{userId}}"
    }
