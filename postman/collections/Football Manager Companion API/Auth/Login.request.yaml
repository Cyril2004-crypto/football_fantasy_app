$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "tester@example.com",
      "password": "Passw0rd!"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 2xx', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      let json = {};

      try { json = pm.response.json(); } catch (e) {}

      const token = json.token || json.idToken || json.accessToken || (json.data
      && (json.data.token || json.data.idToken || json.data.accessToken));

      if (pm.response.code < 200 || pm.response.code > 299) {
        pm.environment.unset('authToken');
      } else if (typeof token === 'string' && token.split('.').length === 3) {
        pm.environment.set('authToken', token.trim());
      } else {
        pm.environment.unset('authToken');
        pm.test('Login response returns valid JWT', function () {
          pm.expect.fail('No valid 3-part JWT found in login response');
        });
      }
    language: text/javascript
order: 2000
